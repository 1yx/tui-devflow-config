# ~/.config/helix/config.toml

theme = "onedark"

[editor]
line-number = "relative"
mouse = false
middle-click-paste = false
auto-format = true
idle-timeout = 250
completion-timeout = 250
preview-completion-insert = true
color-modes = true

[editor.auto-save]
focus-lost = true

[editor.auto-save.after-delay]
enable = true
timeout = 3000

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false
follow-symlinks = true
git-ignore = true
git-global = true
git-exclude = true

[editor.lsp]
display-messages = true
display-inlay-hints = true
auto-signature-help = true

[editor.whitespace]
render = "all"

# Custom keybindings - normal mode
[keys.normal]
C-g = ":run-shell-command lazygit"
C-s = ":write"

# Custom keybindings - insert mode (Emacs-style editing)
[keys.insert]
C-a = "goto_line_start"
C-e = "goto_line_end"
C-b = "move_char_left"
C-f = "move_char_right"
C-n = "move_line_down"
C-p = "move_line_up"
C-k = "kill_to_line_end"
C-u = "kill_to_line_start"
C-w = "delete_word_backward"
A-b = "move_prev_word_start"
A-f = "move_next_word_start"
A-d = "delete_word_forward"
