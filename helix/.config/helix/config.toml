# ~/.config/helix/config.toml

theme = "onedark"

[editor]
line-number = "relative"
mouse = false
middle-click-paste = false
auto-format = true
idle-timeout = 250
completion-timeout = 250
preview-completion-insert = true
color-modes = true

[editor.auto-save]
focus-lost = true

[editor.auto-save.after-delay]
enable = true
timeout = 3000

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false
follow-symlinks = true
git-ignore = true
git-global = true
git-exclude = true

[editor.lsp]
display-messages = true
display-inlay-hints = true
auto-signature-help = true

[editor.whitespace]
render = "all"

# 自定义键位 - normal mode
[keys.normal]
C-g = ":run-shell-command lazygit"
C-s = ":write"

# 自定义键位 - insert mode (Emacs 风格光标控制)
[keys.insert]
C-a = "goto_line_start"     # 行首
C-e = "goto_line_end"       # 行尾
C-b = "move_char_left"      # 左移一字符
C-f = "move_char_right"     # 右移一字符
C-n = "move_line_down"      # 下一行
C-p = "move_line_up"        # 上一行
