# ~/.config/yazi/yazi.toml

[mgr]
ratio = [1, 2, 5]
sort_by = "alphabetical"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "none"
show_hidden = false
show_symlink = true

[preview]
wrap = "yes"
tab_size = 2
max_width = 600
max_height = 900

[opener]
edit = [
  { run = "$EDITOR %s", block = true, for = "unix" }
]
md-preview = [
  { run = "mdfried %s", block = true, for = "unix" }
]

[open]
prepend_rules = [
  { url = "*.md", use = "md-preview" },
  { mime = "text/*", use = "edit" },
]
